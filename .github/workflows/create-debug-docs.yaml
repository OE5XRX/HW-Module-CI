name: Create Debug Docs (reusable)

on:
  workflow_call:

jobs:
  export-ecad:
    name: Export ECAD
    runs-on: ubuntu-24.04
    outputs:
      project-name: ${{ steps.setup.outputs.project-name }}
    steps:
      - name: Setup
        id: setup
        uses: OE5XRX/HW-Module-CI/.github/actions/setup@main

      - name: Inject BETA + git hash into PCB title block
        shell: bash
        run: |
          set -euo pipefail
          COMMIT=$(git rev-parse --short HEAD)
          echo "Injecting BETA-${COMMIT} into *.kicad_*"
          # `--` so a future *.kicad_* match starting with `-` can't be parsed as a sed option
          sed -i "s/<<VERSION>>/BETA-${COMMIT}/g" -- *.kicad_*

      - name: KiBot production export
        shell: bash
        env:
          PROJECT: ${{ steps.setup.outputs.project-name }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workdir" \
            -w /workdir \
            ghcr.io/inti-cmnb/kicad9_auto_full:1.8.5-7_k9.0.7_d13.2_b4.2.4LTS \
            kibot \
              -c _ci/kibot/production.kibot.yaml \
              -d output \
              -e "${PROJECT}.kicad_sch" \
              -b "${PROJECT}.kicad_pcb"

      - name: Fix output directory permissions
        shell: bash
        run: sudo chmod -R a+w output/

      - name: Generate stencil PNG from KiBot SVG
        shell: bash
        run: |
          set -euo pipefail
          pip install -r _ci/scripts/requirements.txt
          python3 _ci/scripts/make_stencil_image.py \
            "output/${{ steps.setup.outputs.project-name }}-stencil_top.svg" \
            "output/${{ steps.setup.outputs.project-name }}-stencil_top.png"

      - name: Upload artefacts
        uses: actions/upload-artifact@v7
        with:
          name: production
          path: output
          if-no-files-found: error

  collect-and-provide:
    runs-on: ubuntu-24.04
    needs: export-ecad
    permissions:
      contents: write
    steps:
      - name: Setup
        uses: OE5XRX/HW-Module-CI/.github/actions/setup@main

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          working-directory: doc
          bundler-cache: true
          cache-version: 0

      - name: Build with Jekyll
        shell: bash
        run: cd doc && bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Download production artefacts into Jekyll output
        uses: actions/download-artifact@v8
        with:
          name: production
          path: doc/_site

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: doc/_site
          clean: true
