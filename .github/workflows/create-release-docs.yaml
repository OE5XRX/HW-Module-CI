name: Create Release Docs (reusable)

on:
  workflow_call:

jobs:
  export-ecad:
    name: Export ECAD
    runs-on: ubuntu-24.04
    steps:
      - name: Setup
        id: setup
        uses: OE5XRX/HW-Module-CI/.github/actions/setup@main

      - name: Inject release tag + git hash into PCB title block
        shell: bash
        run: |
          set -euo pipefail
          COMMIT=$(git rev-parse --short HEAD)
          RAW="${GITHUB_REF_NAME}-${COMMIT}"
          # Escape sed-replacement metacharacters (/, &, \). Tag names may legally
          # contain `/` (e.g. `release/v1.2`); without escaping, sed would treat
          # it as a delimiter change and abort.
          REPLACEMENT=$(printf '%s' "$RAW" | sed -e 's/[\/&\\]/\\&/g')
          echo "Injecting $RAW into *.kicad_*"
          # `--` so a future *.kicad_* match starting with `-` can't be parsed as a sed option
          sed -i "s/<<HASH>>/${REPLACEMENT}/g" -- *.kicad_*

      - name: KiBot production export
        shell: bash
        env:
          PROJECT: ${{ steps.setup.outputs.project-name }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workdir" \
            -w /workdir \
            setsoft/kicad_auto:ki9 \
            kibot \
              -c _ci/kibot/production.kibot.yaml \
              -d output \
              -e "${PROJECT}.kicad_sch" \
              -b "${PROJECT}.kicad_pcb"

      - name: Fix output directory permissions
        shell: bash
        run: sudo chmod -R a+w output/

      - name: Generate stencil PNG from KiBot SVG
        shell: bash
        run: |
          set -euo pipefail
          pip install -r _ci/scripts/requirements.txt
          python3 _ci/scripts/make_stencil_image.py \
            "output/${{ steps.setup.outputs.project-name }}-stencil_top.svg" \
            "output/${{ steps.setup.outputs.project-name }}-stencil_top.png"

      - name: Copy doc/ files into output folder
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=( doc/* )
          if [ "${#files[@]}" -gt 0 ]; then
            sudo cp "${files[@]}" output/
          fi

      - name: Upload artefacts
        uses: actions/upload-artifact@v7
        with:
          name: production
          path: output
          if-no-files-found: error

      - name: Deploy to OE5XRX.github.io
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.DEPLOY_GH_TOKEN }}
          repository-name: OE5XRX/OE5XRX.github.io
          branch: main
          folder: output
          target-folder: docs/remote-station/hardware/${{ github.event.repository.name }}
          clean: true

      # Runs last and non-blocking: if InvenTree is down or misbehaves, the
      # release artefacts are still uploaded and the docs deploy already
      # succeeded. The step shows red in the UI and can be re-run via
      # `gh run rerun <id> --failed`.
      - name: Generate parts on InvenTree server
        if: always()
        continue-on-error: true
        shell: bash
        env:
          INVENTREE_API_TOKEN: ${{ secrets.INVENTREE_API_TOKEN }}
          INVENTREE_API_HOST:  ${{ secrets.INVENTREE_API_HOST }}
          MOUSER_API_KEY:      ${{ secrets.MOUSER_API_KEY }}
        run: |
          set -euo pipefail
          pip install -r _ci/scripts/requirements.txt
          python3 _ci/scripts/bom_export.py \
            --csv_file       "output/${{ steps.setup.outputs.project-name }}-bom.csv" \
            --name           "${{ github.event.repository.name }}" \
            --version        "${{ github.ref_name }}" \
            --pcb_image      "output/${{ steps.setup.outputs.project-name }}-3D_top-without.png" \
            --assembly_image "output/${{ steps.setup.outputs.project-name }}-3D_top-with.png" \
            --stencil_image  "output/${{ steps.setup.outputs.project-name }}-stencil_top.png"
