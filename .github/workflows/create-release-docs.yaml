name: Create Release Docs (reusable)

on:
  workflow_call:

jobs:
  export-ecad:
    name: Export ECAD
    runs-on: ubuntu-24.04
    steps:
      - name: Setup
        id: setup
        uses: OE5XRX/HW-Module-CI/.github/actions/setup@main

      - name: Inject release version into title blocks
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Schematic title block: full MAJOR.MINOR (no v-prefix), e.g. "1.5".
          # The schematic changes on every Minor bump, so the rev field
          # tracks the full semver — readers can tell two schematic PDFs
          # apart by their rev.
          SCH_RAW="${REF_NAME#v}"
          # PCB title block: MAJOR only with v-prefix, e.g. "v1". The PCB
          # is byte-identical across an entire Major (Minor bumps don't
          # touch *.kicad_pcb), and the website archive uses /v<MAJOR>/
          # paths — so the silkscreen matches the physical hardware
          # revision and the archive layout, not the per-Minor docs.
          MAJOR="${SCH_RAW%%.*}"
          PCB_RAW="v${MAJOR}"
          # Escape sed-replacement metacharacters (/, &, \). Tag names may
          # legally contain `/` (e.g. `release/1.2`); without escaping, sed
          # would treat it as a delimiter change and abort.
          esc() { printf '%s' "$1" | sed -e 's/[\/&\\]/\\&/g'; }
          SCH_REPLACEMENT=$(esc "$SCH_RAW")
          PCB_REPLACEMENT=$(esc "$PCB_RAW")
          echo "Injecting '$SCH_RAW' into *.kicad_sch and '$PCB_RAW' into *.kicad_pcb"
          # `--` so a future *.kicad_* match starting with `-` can't be parsed as a sed option
          sed -i "s/<<VERSION>>/${SCH_REPLACEMENT}/g" -- *.kicad_sch
          sed -i "s/<<VERSION>>/${PCB_REPLACEMENT}/g" -- *.kicad_pcb

      - name: KiBot production export
        shell: bash
        env:
          PROJECT: ${{ steps.setup.outputs.project-name }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workdir" \
            -w /workdir \
            ghcr.io/inti-cmnb/kicad9_auto_full:1.8.5-7_k9.0.7_d13.2_b4.2.4LTS \
            kibot \
              -c _ci/kibot/production.kibot.yaml \
              -d output \
              -e "${PROJECT}.kicad_sch" \
              -b "${PROJECT}.kicad_pcb"

      - name: Fix output directory permissions
        shell: bash
        run: sudo chmod -R a+w output/

      - name: Generate stencil PNG from KiBot SVG
        shell: bash
        run: |
          set -euo pipefail
          pip install -r _ci/scripts/requirements.txt
          python3 _ci/scripts/make_stencil_image.py \
            "output/${{ steps.setup.outputs.project-name }}-stencil_top.svg" \
            "output/${{ steps.setup.outputs.project-name }}-stencil_top.png"

      - name: Copy consumer-authored content into output folder
        shell: bash
        run: |
          set -euo pipefail
          # Only the files the consumer actually authored — NOT the Jekyll
          # staging files the setup composite action copies into doc/ at
          # build time (_config.yml, Gemfile, favicon.ico, Icon.png) and NOT
          # the runtime _data/project.yml. Those exist solely for the local
          # debug-docs Jekyll build and have no business in the cross-repo
          # deploy artefact.
          if [ -d doc ]; then
            sudo find doc -maxdepth 1 -type f \
              \( -name '*.md' -o -name '*.png' -o -name '*.jpg' \
                 -o -name '*.jpeg' -o -name '*.svg' -o -name '*.gif' \) \
              ! -name 'Icon.png' \
              -exec cp {} output/ \;
          fi

      - name: Resolve Liquid placeholders in deployed markdown
        shell: bash
        env:
          PROJECT: ${{ steps.setup.outputs.project-name }}
        run: |
          set -euo pipefail
          # The deployed *.md ships raw to oe5xrx.org's Jekyll, which doesn't
          # see the per-build doc/_data/project.yml that the setup composite
          # action writes (that file lives only in the consumer-side worktree
          # for debug-docs builds). Resolve the placeholders here so the
          # deployed links come out as PowerBoard-schematic.pdf, not
          # -schematic.pdf.
          shopt -s nullglob
          for f in output/*.md; do
            sudo sed -i \
              -e "s|{{ site.data.project.name }}|${PROJECT}|g" \
              -e "s|{{ site\.data\['hash'\] }}||g" \
              -e "s|{{ site.data.hash }}||g" \
              "$f"
          done

      - name: Upload artefacts
        uses: actions/upload-artifact@v7
        with:
          name: production
          path: output
          if-no-files-found: error

      - name: Archive previous Major on OE5XRX.github.io
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_GH_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          REPO_NAME: ${{ github.event.repository.name }}
          TARGET_REPO: OE5XRX/OE5XRX.github.io
        run: |
          set -euo pipefail
          python3 _ci/scripts/archive_previous_major.py

      - name: Deploy to OE5XRX.github.io
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.DEPLOY_GH_TOKEN }}
          repository-name: OE5XRX/OE5XRX.github.io
          branch: main
          folder: output
          target-folder: docs/remote-station/hardware/${{ github.event.repository.name }}
          clean: true
          clean-exclude: |
            v[0-9]*

      # InvenTree integration disabled — the OE5XRX InvenTree server was
      # decommissioned (2026-05) and not restored. The bom_export.py script
      # remains in scripts/ for the day a new InvenTree instance comes back
      # online; until then this step would burn a 10s connect-timeout per
      # release run and spam the logs with "Server connection error".
      # When InvenTree returns: re-enable this block and verify
      # INVENTREE_API_HOST, INVENTREE_API_TOKEN and MOUSER_API_KEY
      # org-secrets point at the new instance.
      #
      - name: Generate parts on InvenTree server
        if: always()
        continue-on-error: true
        shell: bash
        env:
          INVENTREE_API_TOKEN: ${{ secrets.INVENTREE_API_TOKEN }}
          INVENTREE_API_HOST:  ${{ secrets.INVENTREE_API_HOST }}
          MOUSER_API_KEY:      ${{ secrets.MOUSER_API_KEY }}
        run: |
          set -euo pipefail
          pip install -r _ci/scripts/requirements.txt
          python3 _ci/scripts/bom_export.py \
            --csv_file       "output/${{ steps.setup.outputs.project-name }}-bom.csv" \
            --name           "${{ github.event.repository.name }}" \
            --version        "${{ github.ref_name }}" \
            --pcb_image      "output/${{ steps.setup.outputs.project-name }}-3D_top-without.png" \
            --assembly_image "output/${{ steps.setup.outputs.project-name }}-3D_top-with.png" \
            --stencil_image  "output/${{ steps.setup.outputs.project-name }}-stencil_top.png" \
            --output_dir     "output/"
